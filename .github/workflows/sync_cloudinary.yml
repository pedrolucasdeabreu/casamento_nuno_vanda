name: Sync Cloudinary Gallery

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # a cada hora

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Cloudinary images
        env:
          CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          set -e

          echo "=== A buscar imagens ==="
          curl -s -u "$API_KEY:$API_SECRET" "https://api.cloudinary.com/v1_1/$CLOUD_NAME/resources/image?max_results=500&prefix=casamento_nuno_vanda" -o /tmp/images.json
          echo "=== Resposta imagens ==="
          cat /tmp/images.json | jq .

          echo "=== A buscar videos ==="
          curl -s -u "$API_KEY:$API_SECRET" "https://api.cloudinary.com/v1_1/$CLOUD_NAME/resources/video?max_results=500&prefix=casamento_nuno_vanda" -o /tmp/videos.json || true
          echo "=== Resposta videos ==="
          cat /tmp/videos.json | jq .

          echo "=== Todas as imagens sem prefix (para ver os public_ids reais) ==="
          curl -s -u "$API_KEY:$API_SECRET" "https://api.cloudinary.com/v1_1/$CLOUD_NAME/resources/image?max_results=10" | jq '[.resources[] | {public_id, secure_url}]'

          [ -s /tmp/images.json ] || echo '{}' > /tmp/images.json
          [ -s /tmp/videos.json ] || echo '{}' > /tmp/videos.json

          jq -s '
            def extract:
              if type == "object" then (.resources // [])
              elif type == "array" then .
              else []
              end;
            [.[0], .[1]]
            | map(extract)
            | flatten
            | map(select(type == "object" and .secure_url != null))
            | sort_by(.created_at // "")
            | reverse
            | map({
                url: .secure_url,
                public_id: .public_id,
                format: .format,
                resource_type: .resource_type,
                width: .width,
                height: .height,
                created_at: .created_at,
                contributor: (.context.contributor // null)
              })
          ' /tmp/images.json /tmp/videos.json > data/gallery.json

          echo "=== gallery.json gerado ==="
          cat data/gallery.json | jq .

      - name: Commit data/gallery.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gallery.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update gallery.json from Cloudinary"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi